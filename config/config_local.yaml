# ============================================================================
# LOCAL / H100 profile — FULL HotpotQA dev (7,405 questions), batched.
# Use with the CLI scripts:   python -m scripts.run_generate --config config/config_local.yaml
# The Colab profile (config/config.yaml) is left untouched.
# ============================================================================

project:
  name: "agent-repair"
  seed: 42

paths:
  drive_base: "/content/drive/MyDrive/agent-repair"   # unused locally
  local_base: "./"
  data_raw: "data/raw"
  data_processed: "data/processed"
  outputs: "outputs"
  trajectories: "outputs/trajectories"
  uncertainty: "outputs/uncertainty"
  annotations: "outputs/annotations"
  localization: "outputs/localization"
  repairs: "outputs/repairs"
  tables: "outputs/tables"
  figures: "outputs/figures"
  logs: "outputs/logs"

dataset:
  name: "hotpotqa_distractor_dev"
  url: "http://curtis.ml.cmu.edu/datasets/hotpot/hotpot_dev_distractor_v1.json"
  raw_filename: "hotpot_dev_distractor_v1.json"
  pool_size: 7405               # FULL dev distractor set
  process_limit: null           # null = process the whole pool
  human_val_size: 50            # trajectories hand-labeled to validate the judge
  stratify_by: ["level", "type"]

# ----------------------------------------------------------------------------
# Batching — the key to using a big GPU properly. Tune down if you hit OOM.
# ----------------------------------------------------------------------------
runtime:
  gen_batch_size: 64            # questions in flight during generation
  repair_batch_size: 64         # repair episodes in flight
  uncertainty_batch_size: 32    # steps per batched self-consistency call
  judge_batch_size: 32          # trajectories per batched judge call

models:
  agent:
    name: "Qwen/Qwen2.5-7B-Instruct"
    dtype: "float16"
    max_model_len: 8192
    gpu_memory_utilization: 0.85   # leave room for a large KV cache (big batches)
  judge:
    name: "Qwen/Qwen2.5-72B-Instruct-AWQ"   # fits on H100 80GB at 4-bit
    dtype: "auto"
    max_model_len: 8192
    gpu_memory_utilization: 0.92
    fallback:
      use_fallback: false
      name: "Qwen/Qwen2.5-32B-Instruct-AWQ"

agent:
  max_steps: 8
  temperature: 0.0
  max_tokens_per_step: 512
  logprobs_topk: 20
  tools: ["search", "lookup", "finish"]
  stop_on_answer: true

uncertainty:
  metrics: ["token_entropy", "perplexity", "max_token_prob",
            "self_consistency", "verbalized_confidence"]
  agg: ["mean", "max"]
  entropy_topk_ablation: [5, 20, 50]
  self_consistency:
    n_samples: 5
    temperature: 0.7
  verbalized_confidence:
    scale: 100

annotation:
  error_types: ["wrong_search_query", "wrong_fact_extraction",
                "faulty_reasoning", "premature_or_wrong_answer",
                "formatting_tool_error"]
  use_programmatic_signal: true
  use_llm_judge: true
  judge_temperature: 0.0

localization:
  rules: ["argmax", "topk", "earliest_above_threshold"]
  topk: [2, 3]
  threshold_percentile: 75

repair:
  baselines: ["full_restart", "random_step", "oracle_targeted"]
  uncertainty_metrics: ["token_entropy_max", "perplexity", "max_token_prob_max",
                        "self_consistency", "verbalized_confidence"]
  uncertainty_rules: ["argmax", "topk", "earliest_above_threshold"]
  topk_for_repair: 3
  threshold_percentile: 75
  seeds: [0, 1, 2]              # 3 seeds -> proper confidence intervals (affordable locally)
  nudge:
    enabled: true
    temperature: 0.7
    retry_hint: "Your previous attempt at this step may have been wrong. Reconsider carefully."
  budget:
    match_to: "full_restart"
    multipliers: [0.5, 1.0, 2.0]

evaluation:
  scorer: ["em", "f1"]
  semantic_equivalence_check: true
  bootstrap_iters: 10000
  ci: 0.95
  paired_test: "mcnemar"
  multiple_comparison_correction: "holm"

ablations:
  model_size: false
  model_size_small: "Qwen/Qwen2.5-3B-Instruct"
